name: SEO checks and sitemap ping

on:
  schedule:
    - cron: '17 3 * * *'  # daily at 03:17 UTC
  push:
    branches: [ main ]

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
      - name: Run SEO check
        run: npm run seo-check

  ping-sitemaps:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" "https://www.google.com/ping?sitemap=https://incr-ediblecupcakes.com/sitemap.xml"
      - name: Ping Bing
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" "https://www.bing.com/ping?sitemap=https://incr-ediblecupcakes.com/sitemap.xml"
