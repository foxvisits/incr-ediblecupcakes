name: SEO checks and sitemap ping

on:
  schedule:
    - cron: '17 3 * * *'  # daily at 03:17 UTC
  push:
    branches: [ main ]
    paths:
      - 'public/sitemap.xml'
      - 'public/llms.txt'
      - 'src/data/recipes/**'
      - 'src/data/guides/**'
      - 'scripts/**'

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
      - name: Regenerate SEO files
        run: npm run update-seo -- --no-indexnow
      - name: Run SEO check
        run: npm run seo-check
      - name: Astro check
        run: npm run lint

  index-and-ping:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
      - name: SEO sync + IndexNow + sitemap ping
        run: npm run update-seo -- --ping
        env:
          INDEXNOW_KEY: a48df6c167094534b369300a89f8f530
