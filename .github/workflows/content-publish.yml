name: Content publish (scheduled recipes)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Publish due recipes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: npm run content:publish-due

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ src/data/recipes/generated/ src/data/guides/generated/ public/*.jpg public/guide-*.jpg public/*-2.jpg public/*-3.jpg public/sitemap.xml content/ideas.json content/guide-ideas.json
          git diff --staged --quiet || git commit -m "content: publish scheduled recipes [automated]"
          git push
